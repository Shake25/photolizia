<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片线条编织生成</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f4f4f4;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
    }

    .toolbar {
      width: 100%;
      min-height: 58px;
      padding: 12px 18px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 130px;
    }

    button {
      border: none;
      border-radius: 8px;
      background: #111;
      color: #fff;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      color: #007a8a;
      font-size: 13px;
      min-width: 190px;
    }

    .tips {
      padding: 12px 20px 6px;
      text-align: center;
      color: #666;
      font-size: 13px;
      line-height: 1.6;
    }

    #canvas-wrap {
      width: 100%;
      overflow: auto;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    canvas {
      display: block;
      background: #f8f8f8;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>

<body>
  <div class="toolbar">
    <div class="group">
      <span>上传图片</span>
      <input id="imageInput" type="file" accept="image/*" />
    </div>

    <div class="group">
      <span>速度</span>
      <input id="speedSlider" type="range" min="0.5" max="6" step="0.1" value="2.4" />
      <span id="speedValue">2.4</span>
    </div>

    <div class="group">
      <span>弯曲度</span>
      <input id="curlSlider" type="range" min="0" max="4" step="0.1" value="1.1" />
      <span id="curlValue">1.1</span>
    </div>

    <div class="group">
      <span>采样间距</span>
      <input id="gapSlider" type="range" min="2" max="9" step="1" value="4" />
      <span id="gapValue">4</span>
    </div>

    <div class="group">
      <label>
        <input id="colorToggle" type="checkbox" />
        使用原图颜色
      </label>
    </div>

    <div class="group">
      <label>
        <input id="ghostToggle" type="checkbox" />
        显示淡底图
      </label>
    </div>

    <button id="restartBtn">重新编织</button>

    <span id="status">等待上传图片</span>
  </div>

  <div class="tips">
    关键参数：采样间距越小越清晰，建议 3 或 4。  
    这个版本会限制线条只在图片暗部、边缘、主体区域落笔，不会整张画布乱画。
  </div>

  <div id="canvas-wrap"></div>

  <script>
    let img = null;
    let canvas;

    let targets = [];
    let threads = [];

    let strengthMap = null;
    let maskMap = null;

    let speed = 2.4;
    let curliness = 1.1;
    let sampleGap = 4;

    let useOriginalColor = false;
    let showGhost = false;

    let activationIndex = 0;
    let activationRate = 420;

    const BG = 248;
    const MAX_W = 1200;
    const MAX_H = 820;
    const MAX_THREADS = 28000;

    function setup() {
      canvas = createCanvas(900, 600);
      canvas.parent("canvas-wrap");

      pixelDensity(1);
      colorMode(RGB, 255);
      background(BG);

      drawIntro();
      initControls();
      noLoop();
    }

    function draw() {
      if (!img) return;

      const end = Math.min(activationIndex + activationRate, threads.length);

      for (let i = activationIndex; i < end; i++) {
        threads[i].active = true;
      }

      activationIndex = end;

      let alive = 0;

      for (let i = 0; i < threads.length; i++) {
        const t = threads[i];

        if (!t.active || t.done) continue;

        t.update();
        t.render();
        alive++;
      }

      document.getElementById("status").textContent =
        `总轨迹 ${threads.length} / 已激活 ${activationIndex}`;

      if (activationIndex >= threads.length && alive === 0) {
        noLoop();
        document.getElementById("status").textContent =
          `完成，共 ${threads.length} 条轨迹`;
      }
    }

    function drawIntro() {
      background(BG);

      noStroke();
      fill(40);
      textAlign(CENTER, CENTER);
      textSize(28);
      text("上传图片，开始线条编织", width / 2, height / 2 - 20);

      fill(120);
      textSize(15);
      text("线条会从左向右生成，并根据图片暗部与边缘逐步织出图像", width / 2, height / 2 + 20);
    }

    function initControls() {
      const imageInput = document.getElementById("imageInput");

      const speedSlider = document.getElementById("speedSlider");
      const speedValue = document.getElementById("speedValue");

      const curlSlider = document.getElementById("curlSlider");
      const curlValue = document.getElementById("curlValue");

      const gapSlider = document.getElementById("gapSlider");
      const gapValue = document.getElementById("gapValue");

      const colorToggle = document.getElementById("colorToggle");
      const ghostToggle = document.getElementById("ghostToggle");

      const restartBtn = document.getElementById("restartBtn");

      imageInput.addEventListener("change", function (event) {
        const file = event.target.files[0];

        if (!file) return;

        if (!file.type.startsWith("image/")) {
          alert("请上传图片文件");
          return;
        }

        document.getElementById("status").textContent = "图片读取中...";

        const reader = new FileReader();

        reader.onload = function (e) {
          loadImage(e.target.result, function (loadedImage) {
            img = loadedImage;

            prepareImage();
            buildImageMaps();
            buildTargets();
            buildThreads();
            restartWeave();
          });
        };

        reader.readAsDataURL(file);
      });

      speedSlider.addEventListener("input", function () {
        speed = Number(this.value);
        speedValue.textContent = speed.toFixed(1);
      });

      curlSlider.addEventListener("input", function () {
        curliness = Number(this.value);
        curlValue.textContent = curliness.toFixed(1);
      });

      gapSlider.addEventListener("input", function () {
        sampleGap = Number(this.value);
        gapValue.textContent = sampleGap;

        if (img) {
          buildTargets();
          buildThreads();
          restartWeave();
        }
      });

      colorToggle.addEventListener("change", function () {
        useOriginalColor = this.checked;

        if (img) {
          buildTargets();
          buildThreads();
          restartWeave();
        }
      });

      ghostToggle.addEventListener("change", function () {
        showGhost = this.checked;

        if (img) {
          restartWeave();
        }
      });

      restartBtn.addEventListener("click", function () {
        if (img) {
          buildThreads();
          restartWeave();
        }
      });
    }

    function prepareImage() {
      const scale = Math.min(
        MAX_W / img.width,
        MAX_H / img.height,
        1
      );

      const newW = Math.floor(img.width * scale);
      const newH = Math.floor(img.height * scale);

      img.resize(newW, newH);
      resizeCanvas(img.width, img.height);

      background(BG);
      img.loadPixels();
    }

    function buildImageMaps() {
      img.loadPixels();

      const w = img.width;
      const h = img.height;

      strengthMap = new Uint8Array(w * h);
      maskMap = new Uint8Array(w * h);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const p = x + y * w;
          const idx = 4 * p;

          const r = img.pixels[idx];
          const g = img.pixels[idx + 1];
          const b = img.pixels[idx + 2];
          const a = img.pixels[idx + 3];

          if (a < 10) {
            strengthMap[p] = 0;
            maskMap[p] = 0;
            continue;
          }

          const br = brightnessOf(r, g, b);

          const brRight = getBrightnessAt(Math.min(x + 1, w - 1), y);
          const brDown = getBrightnessAt(x, Math.min(y + 1, h - 1));

          const edge = Math.abs(br - brRight) + Math.abs(br - brDown);
          const darkness = 255 - br;

          const strength = constrain(
            Math.max(darkness, edge * 3),
            0,
            255
          );

          strengthMap[p] = strength;

          // 这一句很关键：
          // 只有图片的暗部、边缘、主体区域允许线条落笔
          maskMap[p] = strength > 12 && br < 253 ? 1 : 0;
        }
      }
    }

    function buildTargets() {
      targets = [];

      const w = img.width;
      const h = img.height;

      for (let x = 0; x < w; x += sampleGap) {
        for (let y = 0; y < h; y += sampleGap) {
          const p = x + y * w;
          const strength = strengthMap[p];

          if (strength < 12) continue;

          const keepChance = map(strength, 12, 255, 0.08, 1.0);

          if (random() > keepChance) continue;

          const c = getTargetColor(x, y, strength);
          const weight = map(strength, 12, 255, 0.25, 1.15);

          targets.push({
            x,
            y,
            strength,
            color: c,
            weight
          });
        }
      }

      if (targets.length > MAX_THREADS) {
        targets = shuffle(targets).slice(0, MAX_THREADS);
      }

      // 从左到右排序，让图像逐步生成
      targets.sort(function (a, b) {
        return a.x - b.x;
      });

      document.getElementById("status").textContent =
        `采样完成，共 ${targets.length} 个目标点`;
    }

    function buildThreads() {
      threads = [];

      for (let i = 0; i < targets.length; i++) {
        threads.push(new ThreadParticle(targets[i]));
      }
    }

    function restartWeave() {
      background(BG);

      if (showGhost) {
        push();
        tint(255, 26);
        image(img, 0, 0);
        pop();
      }

      activationIndex = 0;

      for (let i = 0; i < threads.length; i++) {
        threads[i].reset();
      }

      document.getElementById("status").textContent =
        `准备完成，共 ${threads.length} 条轨迹`;

      loop();
    }

    function getTargetColor(x, y, strength) {
      const idx = 4 * (x + y * img.width);

      const r = img.pixels[idx];
      const g = img.pixels[idx + 1];
      const b = img.pixels[idx + 2];

      const alpha = map(strength, 12, 255, 16, 150);

      if (useOriginalColor) {
        return color(r, g, b, alpha);
      }

      // 默认青蓝色，接近你参考图的风格
      return color(18, 130, 145, alpha);
    }

    function getBrightnessAt(x, y) {
      const idx = 4 * (x + y * img.width);

      const r = img.pixels[idx];
      const g = img.pixels[idx + 1];
      const b = img.pixels[idx + 2];

      return brightnessOf(r, g, b);
    }

    function brightnessOf(r, g, b) {
      return r * 0.299 + g * 0.587 + b * 0.114;
    }

    function canDrawAt(x, y) {
      if (!img || !maskMap) return false;

      const ix = Math.floor(x);
      const iy = Math.floor(y);

      if (ix < 0 || iy < 0 || ix >= img.width || iy >= img.height) {
        return false;
      }

      return maskMap[ix + iy * img.width] === 1;
    }

    class ThreadParticle {
      constructor(target) {
        this.target = target;
        this.reset();
      }

      reset() {
        this.active = false;
        this.done = false;
        this.settling = false;

        this.pos = createVector(
          -random(40, 180),
          this.target.y + random(-90, 90)
        );

        this.prev = this.pos.copy();

        this.vel = createVector(
          random(0.8, 1.6),
          random(-1.2, 1.2)
        );

        this.seed = random(10000);

        this.settleLife = Math.floor(
          map(this.target.strength, 12, 255, 8, 30)
        );

        this.localRadius = map(this.target.strength, 12, 255, 0.5, 2.4);
      }

      update() {
        if (this.done) return;

        this.prev.x = this.pos.x;
        this.prev.y = this.pos.y;

        const targetVector = createVector(this.target.x, this.target.y);
        const distance = p5.Vector.dist(this.pos, targetVector);

        if (!this.settling && distance < 6) {
          this.settling = true;
        }

        if (this.settling) {
          this.updateSettle();
          return;
        }

        const desired = p5.Vector.sub(targetVector, this.pos);

        if (desired.mag() > 0.001) {
          desired.setMag(speed);
        }

        const steer = p5.Vector.sub(desired, this.vel);
        steer.limit(0.12 + speed * 0.035);

        const n = noise(
          this.pos.x * 0.006,
          this.pos.y * 0.006,
          frameCount * 0.006 + this.seed
        );

        const angle = n * TWO_PI * 4;
        const curlForce = p5.Vector.fromAngle(angle);
        curlForce.mult(curliness * 0.18);

        this.vel.add(steer);
        this.vel.add(curlForce);

        // 保持从左往右推进，避免大面积回头乱画
        if (this.vel.x < 0.25) {
          this.vel.x = 0.25;
        }

        this.vel.limit(speed * 1.7);
        this.pos.add(this.vel);

        if (
          this.pos.x > width + 40 ||
          this.pos.y < -120 ||
          this.pos.y > height + 120
        ) {
          this.done = true;
        }
      }

      updateSettle() {
        const n = noise(
          this.seed,
          frameCount * 0.035
        );

        const angle = n * TWO_PI * 6;

        const tx = this.target.x;
        const ty = this.target.y;

        this.pos.x += (tx - this.pos.x) * 0.2 + Math.cos(angle) * this.localRadius * curliness;
        this.pos.y += (ty - this.pos.y) * 0.2 + Math.sin(angle) * this.localRadius * curliness;

        this.settleLife--;

        if (this.settleLife <= 0) {
          this.done = true;
        }
      }

      render() {
        const mx = (this.prev.x + this.pos.x) * 0.5;
        const my = (this.prev.y + this.pos.y) * 0.5;

        // 这里是修复重点：
        // 不再让线条在白色空白区域随便画，只在图像有效区域落笔
        if (!canDrawAt(mx, my) && !this.settling) {
          return;
        }

        stroke(this.target.color);
        strokeWeight(this.target.weight);
        noFill();

        line(this.prev.x, this.prev.y, this.pos.x, this.pos.y);
      }
    }
  </script>
</body>
</html>
