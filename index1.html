<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片轨迹编织粒子演示</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #f3f3f3;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .toolbar {
      width: 100%;
      padding: 14px 18px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 130px;
    }

    button {
      border: none;
      background: #111;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.9;
    }

    #canvas-wrap {
      margin: 18px auto 40px;
      max-width: 100%;
      overflow: auto;
      padding: 8px;
    }

    canvas {
      display: block;
      box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      background: #f3f3f3;
    }

    .tips {
      color: #666;
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      padding: 10px 20px 0;
    }

    #status {
      color: #0b7285;
      font-size: 13px;
      min-width: 120px;
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <div class="group">
      <span>上传图片</span>
      <input id="imageInput" type="file" accept="image/*" />
    </div>

    <div class="group">
      <span>速度</span>
      <input id="speedSlider" type="range" min="0.5" max="6" step="0.1" value="2.2" />
      <span id="speedValue">2.2</span>
    </div>

    <div class="group">
      <span>弯曲度</span>
      <input id="curlSlider" type="range" min="0" max="4" step="0.1" value="1.4" />
      <span id="curlValue">1.4</span>
    </div>

    <div class="group">
      <span>密度</span>
      <input id="gapSlider" type="range" min="3" max="10" step="1" value="5" />
      <span id="gapValue">5</span>
    </div>

    <div class="group">
      <label>
        <input id="colorToggle" type="checkbox" />
        使用原图颜色
      </label>
    </div>

    <button id="restartBtn">重新编织</button>
    <span id="status">等待上传图片</span>
  </div>

  <div class="tips">
    这个版本不是“点聚合”，而是“线条从左往右逐步编织成图”。<br />
    密度越小越清晰，但性能消耗越大。
  </div>

  <div id="canvas-wrap"></div>

  <script>
    let img = null;
    let canvas;

    let particles = [];
    let targets = [];

    let speed = 2.2;
    let curliness = 1.4;
    let sampleGap = 5;

    let activationIndex = 0;
    let activationRate = 80; // 每帧激活多少条线
    let useOriginalColor = false;

    const MAX_W = 1200;
    const MAX_H = 820;

    function setup() {
      canvas = createCanvas(900, 620);
      canvas.parent("canvas-wrap");
      pixelDensity(1);
      background(243);
      drawStartText();
      initControls();
    }

    function draw() {
      if (!img || particles.length === 0) return;

      // 每一帧逐步激活一些粒子，制造“慢慢织出来”的感觉
      let end = min(activationIndex + activationRate, particles.length);
      for (let i = activationIndex; i < end; i++) {
        particles[i].active = true;
      }
      activationIndex = end;

      let activeCount = 0;
      let doneCount = 0;

      for (let p of particles) {
        if (!p.active) continue;

        if (!p.done) {
          p.update(speed, curliness);
          p.show();
          activeCount++;
        } else {
          doneCount++;
        }
      }

      document.getElementById("status").textContent =
        `总线条 ${particles.length} / 已激活 ${activationIndex}`;

      // 全部完成后停住
      if (doneCount >= particles.length && activationIndex >= particles.length) {
        noLoop();
        document.getElementById("status").textContent =
          `完成，共 ${particles.length} 条轨迹`;
      }
    }

    function drawStartText() {
      background(243);
      fill(50);
      noStroke();
      textAlign(CENTER, CENTER);
      textSize(28);
      text("上传一张图片，开始轨迹编织", width / 2, height / 2 - 20);
      fill(120);
      textSize(15);
      text("效果更接近你发的参考图：从左往右用轨迹慢慢织出图像", width / 2, height / 2 + 18);
    }

    function initControls() {
      const imageInput = document.getElementById("imageInput");
      const speedSlider = document.getElementById("speedSlider");
      const speedValue = document.getElementById("speedValue");

      const curlSlider = document.getElementById("curlSlider");
      const curlValue = document.getElementById("curlValue");

      const gapSlider = document.getElementById("gapSlider");
      const gapValue = document.getElementById("gapValue");

      const colorToggle = document.getElementById("colorToggle");
      const restartBtn = document.getElementById("restartBtn");

      imageInput.addEventListener("change", function (e) {
        const file = e.target.files[0];
        if (!file) return;

        if (!file.type.startsWith("image/")) {
          alert("请上传图片文件");
          return;
        }

        document.getElementById("status").textContent = "图片加载中...";

        const reader = new FileReader();
        reader.onload = function (ev) {
          loadImage(ev.target.result, function (loadedImg) {
            img = loadedImg;
            prepareImage();
            buildTargets();
            buildParticles();
            restartWeave();
          });
        };
        reader.readAsDataURL(file);
      });

      speedSlider.addEventListener("input", function () {
        speed = Number(this.value);
        speedValue.textContent = speed.toFixed(1);
      });

      curlSlider.addEventListener("input", function () {
        curliness = Number(this.value);
        curlValue.textContent = curliness.toFixed(1);
      });

      gapSlider.addEventListener("input", function () {
        sampleGap = Number(this.value);
        gapValue.textContent = sampleGap;
        if (img) {
          buildTargets();
          buildParticles();
          restartWeave();
        }
      });

      colorToggle.addEventListener("change", function () {
        useOriginalColor = this.checked;
        if (img) {
          buildTargets();
          buildParticles();
          restartWeave();
        }
      });

      restartBtn.addEventListener("click", function () {
        if (img) {
          buildParticles();
          restartWeave();
        }
      });
    }

    function prepareImage() {
      let scale = min(MAX_W / img.width, MAX_H / img.height, 1);
      let newW = floor(img.width * scale);
      let newH = floor(img.height * scale);

      img.resize(newW, newH);
      resizeCanvas(img.width, img.height);
      background(243);
      img.loadPixels();
    }

    function buildTargets() {
      targets = [];
      img.loadPixels();

      // 从左到右扫描，天然就有“左先右后”的结构
      for (let x = 0; x < img.width; x += sampleGap) {
        for (let y = 0; y < img.height; y += sampleGap) {
          let idx = 4 * (x + y * img.width);

          let r = img.pixels[idx];
          let g = img.pixels[idx + 1];
          let b = img.pixels[idx + 2];
          let a = img.pixels[idx + 3];

          if (a < 20) continue;

          let brightness = (r + g + b) / 3;
          let darkness = 255 - brightness;

          // 让深色区域保留更多轨迹，浅色区域更少
          let keepChance = map(darkness, 0, 255, 0.03, 1.0);

          if (random() < keepChance) {
            let c;

            if (useOriginalColor) {
              c = color(r, g, b, map(darkness, 0, 255, 22, 140));
            } else {
              // 接近参考图的青蓝色单色风格
              let tone = map(darkness, 0, 255, 170, 40);
              c = color(30, 135, 145, map(darkness, 0, 255, 18, 120));
            }

            targets.push({
              x,
              y,
              c,
              darkness
            });
          }
        }
      }

      // 避免极端过量
      if (targets.length > 12000) {
        targets = shuffle(targets).slice(0, 12000);
        targets.sort((a, b) => a.x - b.x);
      }
    }

    function buildParticles() {
      particles = [];
      for (let t of targets) {
        particles.push(new WeaveParticle(t));
      }
    }

    function restartWeave() {
      background(243);
      activationIndex = 0;
      loop();
      document.getElementById("status").textContent =
        `准备完成，共 ${particles.length} 条轨迹`;
    }

    class WeaveParticle {
      constructor(target) {
        this.target = target;
        this.active = false;
        this.done = false;

        this.reset();
      }

      reset() {
        this.pos = createVector(
          -random(20, 160),
          this.target.y + random(-80, 80)
        );

        this.prev = this.pos.copy();

        this.vx = random(0.8, 1.6);
        this.vy = random(-1.5, 1.5);

        this.seed = random(1000);
        this.weight = random(0.4, 1.1);
        this.settleFrames = floor(random(4, 12));
      }

      update(moveSpeed, curl) {
        if (this.done) return;

        this.prev.x = this.pos.x;
        this.prev.y = this.pos.y;

        let dx = this.target.x - this.pos.x;
        let dy = this.target.y - this.pos.y;

        // 主方向：持续向右
        this.vx = moveSpeed * random(0.92, 1.08);

        // 越接近目标x，越强烈向目标y靠拢
        let pullY = map(
          constrain(this.pos.x, 0, max(this.target.x, 1)),
          0,
          max(this.target.x, 1),
          0.015,
          0.2
        );

        this.vy += dy * pullY * 0.08;

        // 轨迹卷曲感
        let n = noise(
          this.pos.x * 0.008,
          this.pos.y * 0.008,
          frameCount * 0.01 + this.seed
        );

        let wiggle = map(n, 0, 1, -1, 1) * curl * 1.35;
        this.vy += wiggle;

        this.vy *= 0.9;

        this.pos.x += this.vx;
        this.pos.y += this.vy;

        // 到达目标x后，做少量局部缠绕，再结束
        if (this.pos.x >= this.target.x) {
          this.pos.x = this.target.x + random(-1.2, 1.2);
          this.pos.y += (this.target.y - this.pos.y) * 0.22 + random(-0.8, 0.8) * curl * 0.45;

          this.settleFrames--;
          if (this.settleFrames <= 0) {
            this.done = true;
          }
        }

        // 保险：避免极端飞出
        if (this.pos.y < -100 || this.pos.y > height + 100 || this.pos.x > width + 40) {
          this.done = true;
        }
      }

      show() {
        stroke(this.target.c);
        strokeWeight(this.weight);
        noFill();
        line(this.prev.x, this.prev.y, this.pos.x, this.pos.y);
      }
    }
  </script>
</body>
</html>
